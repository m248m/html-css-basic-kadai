<!DOCTYPE html>
<html>
<head>
  <title>8章課題</title>
  <meta name="description" content="このページは8章の課題です。">
  <meta charset="UTF-8">
</head>
<body>
  <header>
    <h1>SAMURAIニュース</h1>
    <nav>
      <a href="https://www.sejuku.net/">ホーム</a>
      <a href="https://www.sejuku.net/">社会</a>
      <a href="https://www.sejuku.net/">経済</a>
      <a href="https://www.sejuku.net/">スポーツ</a>
      <a href="https://www.sejuku.net/">テクノロジー</a>
    </nav>
  </header>
  <main>
    <article>
      <h2>社会</h2>
      <section>
        <h3>和菓子店も「トリックオアトリート！」</h3>
        <p>日本でも年々人気の高まるハロウィン。<br>
        今年は大手和菓子店5社がハロウィン向けの和菓子セットを共同開発しました。</p>
        <audio src="ichi.mp3" controls></audio>
      </section>
      <section>
        <h3>私のおすすめ和菓子アンケートフォーム</h3>
        <form>
          氏名 <input type="text" name="name" placeholder="名前を入力してください"><br>
          年代 <select name="age">
            <option value="10代以下">10代以下</option>
            <option value="20代">20代</option>
            <option value="30代">30代</option>
            <option value="40代以上">40代以上</option>
          </select><br>
          男性 <input type="radio" name="gender" value="male"> 女性 <input type="radio" name="gender" value="female"> その他 <input type="radio" name="gender" value="other"><br>
          おすすめ和菓子の名称 <input type="text" name="wagashi" placeholder="例：みたらし団子"><br>
          おすすめする理由 <textarea name="reason" rows="4" cols="40"></textarea><br>
          個人情報保護方針に同意する <input type="checkbox" name="agree" value="yes"><br>
          <button type="submit">送信</button>
          <button type="reset">リセット</button>
        </form>
      </section>
    </article>
    <article>
      <h2>テクノロジー</h2>
      <section>
        <h3>SAMURAIが新しい動画をリリース</h3>
        <p>SAMURAI公式YouTubeで新しい動画がリリースされました。<br>
        動画の内容はHTML/CSSの解説です。</p>
      </section>
    </article>
  </main>
  <footer>
    <p>&copy;SAMURAIニュース</p>
  </footer>
</body>
</html>
